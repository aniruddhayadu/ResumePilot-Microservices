server:
  port: 8080
  forward-headers-strategy: native

spring:
  config:
    import:
      - optional:file:D:/ResumePilot/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]

  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      forwarded:
        enabled: true
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      globalcors:
        cors-configurations:
          "[/**]":
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - Location
            allowCredentials: true
            maxAge: 3600

      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**,/oauth2/**,/login,/login/**,/login/oauth2/**,/api/admin/**
          filters:
            - PreserveHostHeader
            - SetRequestHeader=X-Forwarded-Proto, ${OAUTH2_REDIRECT_PROTO:http}
            - SetRequestHeader=X-Forwarded-Host, ${OAUTH2_REDIRECT_HOST:localhost}
            - SetRequestHeader=X-Forwarded-Port, ${OAUTH2_REDIRECT_PORT:8080}

        - id: template-images
          uri: lb://template-service
          predicates:
            - Path=/templates/images/**
          filters:
            - RewritePath=/templates/images/(?<segment>.*), /images/$\{segment}

        - id: template-direct-images
          uri: lb://template-service
          predicates:
            - Path=/images/**

        - id: template-service
          uri: lb://template-service
          predicates:
            - Path=/api/templates/**,/api/payments/**

        - id: resume-service
          uri: lb://resume-service
          predicates:
            - Path=/resume/**

        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/ai/**

        - id: export-service
          uri: lb://export-service
          predicates:
            - Path=/export/**,/exports/**

        - id: jobmatch-service-api
          uri: lb://jobmatch-service
          predicates:
            - Path=/api/jobmatch/**
          filters:
            - RewritePath=/api/jobmatch/(?<segment>.*), /job-matches/$\{segment}

        - id: jobmatch-service
          uri: lb://jobmatch-service
          predicates:
            - Path=/job-matches/**

# YAHAN CHANGE KIYA HAI 👇
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:${EUREKA_SERVER_URL:http://eureka-server:8761/eureka/}}
  instance:
    prefer-ip-address: true
