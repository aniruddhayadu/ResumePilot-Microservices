server:
    port: 8086

spring:
    config:
        import:
            - optional:file:D:/ResumePilot/.env[.properties]
            - optional:file:../.env[.properties]
            - optional:file:.env[.properties]

    application:
        name: notification-service

    # Kafka Configuration
    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            group-id: notification-group
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        listener:
            missing-topics-fatal: false

    # Email Configuration
    mail:
        host: ${MAIL_HOST:smtp.gmail.com}
        port: ${MAIL_PORT:587}
        username: ${NOTIFICATION_EMAIL_USERNAME:${EMAIL_USERNAME:}}
        password: ${NOTIFICATION_EMAIL_PASSWORD:${EMAIL_PASSWORD:}}
        properties:
            mail:
                smtp:
                    auth: true
                    connectiontimeout: 5000
                    timeout: 5000
                    writetimeout: 5000
                    starttls:
                        enable: true
                        required: true

eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_URL:${EUREKA_SERVER_URL:http://localhost:8761/eureka/}}
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true
        hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
        instance-id: ${spring.application.name}:${random.value}
