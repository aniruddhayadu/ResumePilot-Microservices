services:
  mysql:
    image: mysql:8.0
    container_name: resumepilot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - resumepilot-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: resumepilot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - resumepilot-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: resumepilot-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: "${KAFKA_ADVERTISED_LISTENERS:?Set KAFKA_ADVERTISED_LISTENERS in .env}"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - resumepilot-net

  eureka-server:
    build:
      context: ./eureka-server
    image: resumepilot/eureka-server:local
    container_name: resumepilot-eureka-server
    environment:
      EUREKA_INSTANCE_HOSTNAME: "${DOCKER_EUREKA_HOSTNAME:?Set DOCKER_EUREKA_HOSTNAME in .env}"
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "false"
      EUREKA_CLIENT_FETCH_REGISTRY: "false"
    ports:
      - "8761:8761"
    networks:
      - resumepilot-net

  api-gateway:
    build:
      context: ./api-gateway
    image: resumepilot/api-gateway:local
    container_name: resumepilot-api-gateway
    depends_on:
      - eureka-server
    environment:
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}"
      OAUTH2_REDIRECT_PROTO: "${OAUTH2_REDIRECT_PROTO:?Set OAUTH2_REDIRECT_PROTO in .env}"
      OAUTH2_REDIRECT_HOST: "${OAUTH2_REDIRECT_HOST:?Set OAUTH2_REDIRECT_HOST in .env}"
      OAUTH2_REDIRECT_PORT: "${OAUTH2_REDIRECT_PORT:?Set OAUTH2_REDIRECT_PORT in .env}"
    ports:
      - "8080:8080"
    networks:
      - resumepilot-net

  auth-service:
    build:
      context: ./auth-service
    image: resumepilot/auth-service:local
    container_name: resumepilot-auth-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      AUTH_DATASOURCE_URL: "${AUTH_DOCKER_DATASOURCE_URL:?Set AUTH_DOCKER_DATASOURCE_URL in .env}"
      DB_USERNAME: "${DB_USERNAME:?Set DB_USERNAME in .env}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      MAIL_HOST: "${MAIL_HOST:?Set MAIL_HOST in .env}"
      MAIL_PORT: "${MAIL_PORT:?Set MAIL_PORT in .env}"
      KAFKA_BOOTSTRAP_SERVERS: "${DOCKER_KAFKA_BOOTSTRAP_SERVERS:?Set DOCKER_KAFKA_BOOTSTRAP_SERVERS in .env}"
      AUTH_EMAIL_USERNAME: "${AUTH_EMAIL_USERNAME:?Set AUTH_EMAIL_USERNAME in .env}"
      AUTH_EMAIL_PASSWORD: "${AUTH_EMAIL_PASSWORD:?Set AUTH_EMAIL_PASSWORD in .env}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:?Set GOOGLE_CLIENT_ID in .env}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:?Set GOOGLE_CLIENT_SECRET in .env}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI:?Set GOOGLE_REDIRECT_URI in .env}"
      GATEWAY_BASE_URL: "${GATEWAY_BASE_URL:-http://localhost:8080}"
      FRONTEND_URL: "${FRONTEND_URL:?Set FRONTEND_URL in .env}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: auth-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
    ports:
      - "8081:8081"
    networks:
      - resumepilot-net

  resume-service:
    build:
      context: ./resume-service
    image: resumepilot/resume-service:local
    container_name: resumepilot-resume-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      RESUME_DATASOURCE_URL: "${RESUME_DOCKER_DATASOURCE_URL:?Set RESUME_DOCKER_DATASOURCE_URL in .env}"
      DB_USERNAME: "${DB_USERNAME:?Set DB_USERNAME in .env}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: resume-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8082:8082"
    networks:
      - resumepilot-net

  export-service:
    build:
      context: ./export-service
    image: resumepilot/export-service:local
    container_name: resumepilot-export-service
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      EXPORT_DATASOURCE_URL: "${EXPORT_DOCKER_DATASOURCE_URL:?Set EXPORT_DOCKER_DATASOURCE_URL in .env}"
      DB_USERNAME: "${DB_USERNAME:?Set DB_USERNAME in .env}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      AWS_ACCESS_KEY: "${AWS_ACCESS_KEY:?Set AWS_ACCESS_KEY in .env}"
      AWS_SECRET_KEY: "${AWS_SECRET_KEY:?Set AWS_SECRET_KEY in .env}"
      AWS_BUCKET_NAME: "${AWS_BUCKET_NAME:?Set AWS_BUCKET_NAME in .env}"
      AWS_REGION: "${AWS_REGION:?Set AWS_REGION in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: export-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8083:8083"
    networks:
      - resumepilot-net

  template-service:
    build:
      context: ./template-service
    image: resumepilot/template-service:local
    container_name: resumepilot-template-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      TEMPLATE_DATASOURCE_URL: "${TEMPLATE_DOCKER_DATASOURCE_URL:?Set TEMPLATE_DOCKER_DATASOURCE_URL in .env}"
      DB_USERNAME: "${DB_USERNAME:?Set DB_USERNAME in .env}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      KAFKA_BOOTSTRAP_SERVERS: "${DOCKER_KAFKA_BOOTSTRAP_SERVERS:?Set DOCKER_KAFKA_BOOTSTRAP_SERVERS in .env}"
      RAZORPAY_KEY: "${RAZORPAY_KEY:?Set RAZORPAY_KEY in .env}"
      RAZORPAY_SECRET: "${RAZORPAY_SECRET:?Set RAZORPAY_SECRET in .env}"
      TEST_EMAIL: "${TEST_EMAIL:?Set TEST_EMAIL in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: template-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8084:8084"
    networks:
      - resumepilot-net

  ai-service:
    build:
      context: ./ai-service
    image: resumepilot/ai-service:local
    container_name: resumepilot-ai-service
    depends_on:
      - eureka-server
    environment:
      GEMINI_URL: "${GEMINI_URL:?Set GEMINI_URL in .env}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}"
      GEMINI_FALLBACK_URLS: "${GEMINI_FALLBACK_URLS:?Set GEMINI_FALLBACK_URLS in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: ai-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8085:8085"
    networks:
      - resumepilot-net

  notification-service:
    build:
      context: ./notification-service
    image: resumepilot/notification-service:local
    container_name: resumepilot-notification-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "${DOCKER_KAFKA_BOOTSTRAP_SERVERS:?Set DOCKER_KAFKA_BOOTSTRAP_SERVERS in .env}"
      MAIL_HOST: "${MAIL_HOST:?Set MAIL_HOST in .env}"
      MAIL_PORT: "${MAIL_PORT:?Set MAIL_PORT in .env}"
      NOTIFICATION_EMAIL_USERNAME: "${NOTIFICATION_EMAIL_USERNAME:?Set NOTIFICATION_EMAIL_USERNAME in .env}"
      NOTIFICATION_EMAIL_PASSWORD: "${NOTIFICATION_EMAIL_PASSWORD:?Set NOTIFICATION_EMAIL_PASSWORD in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: notification-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8086:8086"
    networks:
      - resumepilot-net

  jobmatch-service:
    build:
      context: ./jobmatch-service
    image: resumepilot/jobmatch-service:local
    container_name: resumepilot-jobmatch-service
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
      eureka-server:
        condition: service_started
    environment:
      JOBMATCH_DATASOURCE_URL: "${JOBMATCH_DOCKER_DATASOURCE_URL:?Set JOBMATCH_DOCKER_DATASOURCE_URL in .env}"
      DB_USERNAME: "${DB_USERNAME:?Set DB_USERNAME in .env}"
      DB_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
      RAPIDAPI_KEY: "${RAPIDAPI_KEY:?Set RAPIDAPI_KEY in .env}"
      AI_SERVICE_URL: "${DOCKER_AI_SERVICE_URL:?Set DOCKER_AI_SERVICE_URL in .env}"
      EUREKA_URL: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: "${DOCKER_EUREKA_URL:?Set DOCKER_EUREKA_URL in .env}"
      EUREKA_INSTANCE_HOSTNAME: jobmatch-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8087:8087"
    networks:
      - resumepilot-net

  frontend:
    build:
      context: ../resumepilot-ui
      args:
        VITE_RAZORPAY_KEY: "${RAZORPAY_KEY:?Set RAZORPAY_KEY in .env}"
    image: resumepilot/frontend:local
    container_name: resumepilot-frontend
    depends_on:
      - api-gateway
    ports:
      - "5173:80"
    networks:
      - resumepilot-net

networks:
  resumepilot-net:
    driver: bridge

volumes:
  mysql-data:
