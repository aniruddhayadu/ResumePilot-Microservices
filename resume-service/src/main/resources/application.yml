server:
    port: 8082

spring:
    application:
        name: resume-service

    datasource:
        url: jdbc:mysql://localhost:3306/resume_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:root}

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false

eureka:
    client:
        service-url:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        # Crucial Fix:
        prefer-ip-address: false
        hostname: localhost
        instance-id: ${spring.application.name}:${random.value}

jwt:
    secret: ${JWT_SECRET}
