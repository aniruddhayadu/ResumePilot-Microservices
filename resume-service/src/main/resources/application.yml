server:
    port: 8082

spring:
    config:
        import:
            - optional:file:D:/ResumePilot/.env[.properties]
            - optional:file:../.env[.properties]
            - optional:file:.env[.properties]

    application:
        name: resume-service

    datasource:
        url: ${RESUME_DATASOURCE_URL:jdbc:mysql://localhost:3306/resume_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:root}

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        open-in-view: false

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_URL:${EUREKA_SERVER_URL:http://localhost:8761/eureka/}}
        register-with-eureka: true
        fetch-registry: true
    instance:
        # Crucial Fix:
        prefer-ip-address: false
        hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
        instance-id: ${spring.application.name}:${random.value}

jwt:
    secret: ${JWT_SECRET}
