server:
    port: 8085

spring:
    config:
        import:
            - optional:file:D:/ResumePilot/.env[.properties]
            - optional:file:../.env[.properties]
            - optional:file:.env[.properties]

    application:
        name: ai-service
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 15MB
eureka:
    client:
        serviceUrl:
            defaultZone: ${EUREKA_URL:${EUREKA_SERVER_URL:http://localhost:8761/eureka/}}
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true

# Gemini AI Configuration
gemini:
    url: ${GEMINI_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent}
    key: ${GEMINI_API_KEY:${GEMINI_KEY:${GOOGLE_API_KEY:}}}
    fallback-urls: ${GEMINI_FALLBACK_URLS:https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent}
