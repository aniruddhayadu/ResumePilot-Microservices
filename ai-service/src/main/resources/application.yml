server:
    port: 8085

spring:
    application:
        name: ai-service
    servlet:
        multipart:
            max-file-size: 10MB
            max-request-size: 15MB
    datasource:
        url: jdbc:mysql://localhost:3306/resume_ai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/
        register-with-eureka: true
        fetch-registry: true
    instance:
        prefer-ip-address: true

# Gemini AI Configuration
gemini:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
    key: ${GEMINI_API_KEY}